<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天地劫·像素传</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="game-container">
  <canvas id="gameCanvas" width="640" height="480"></canvas>
  <div id="ui-layer">
    <div id="top-bar" class="rpg-panel">
      <span id="chapter-title">第一章：河州镇之劫</span>
      <span id="turn-indicator">我方回合</span>
    </div>
    <div id="unit-info" class="hidden rpg-panel">
      <div class="info-name">夏侯仪</div>
      <div class="info-hp-bar"><div class="hp-fill"></div></div>
      <div class="info-stats">
        <span>HP: <b class="hp">100</b>/<b class="max-hp">100</b></span>
        <span>MP: <b class="mp">50</b>/<b class="max-mp">50</b></span>
      </div>
    </div>
    <div id="action-menu" class="hidden rpg-panel">
      <button data-action="attack">攻击</button>
      <button data-action="magic">法术</button>
      <button data-action="item">道具</button>
      <button data-action="wait">待机</button>
    </div>
    <button id="end-turn-btn" class="hidden">结束回合</button>
    <div id="magic-menu" class="hidden rpg-panel">
      <div class="magic-list"></div>
      <button class="back-btn">返回</button>
    </div>
    <div id="tile-tooltip" class="hidden rpg-panel"></div>
    <div id="dialogue-box" class="hidden rpg-panel">
      <div class="portrait"></div>
      <div class="dialogue-text"></div>
      <div class="dialogue-name"></div>
      <div class="click-hint">▼ 点击继续</div>
    </div>
    <div id="victory-screen" class="hidden overlay">
      <h2>战斗胜利</h2>
      <p class="victory-desc"></p>
      <button id="next-level-btn">下一关</button>
    </div>
    <div id="defeat-screen" class="hidden overlay">
      <h2>战斗失败</h2>
      <p>勇者不败，再来一次！</p>
      <button id="retry-btn">重新挑战</button>
    </div>
    <div id="title-screen" class="overlay">
      <h1>天地劫·像素传</h1>
      <p class="subtitle">像素战棋版 · 经典重现</p>
      <div class="menu">
        <button id="start-btn">开始游戏</button>
        <button id="howto-btn">游戏说明</button>
      </div>
      <p class="footer">纯前端制作 | GitHub Pages部署</p>
    </div>

    <!-- Intermission / Shop Screen -->
    <div id="intermission-screen" class="hidden overlay">
      <h2>营地与商店</h2>
      <div class="intermission-content rpg-panel" style="width: 80%; max-width: 600px; padding: 20px; display: flex; gap: 20px;">
        <div style="flex: 1;">
          <h3 style="color: #e6d8a7; border-bottom: 1px solid #e6d8a7; margin-bottom: 10px; padding-bottom: 5px;">商店</h3>
          <ul id="shop-list" style="list-style: none; margin-bottom: 15px; max-height: 150px; overflow-y: auto;">
             <!-- Shop items injected here -->
          </ul>
          <p style="color: #e6d8a7; font-weight: bold;">持有金钱: <span id="party-gold" style="color: #ffd700;">0</span> G</p>
        </div>
        <div style="flex: 1; border-left: 1px solid rgba(255,255,255,0.2); padding-left: 20px;">
          <h3 style="color: #e6d8a7; border-bottom: 1px solid #e6d8a7; margin-bottom: 10px; padding-bottom: 5px;">队伍</h3>
          <select id="equip-char-select" style="width: 100%; padding: 5px; margin-bottom: 10px; background: #222; color: #fff; border: 1px solid #555;"></select>
          <div id="equip-info" style="font-size: 14px; line-height: 1.6;">
            <!-- Equipment info injected here -->
          </div>
        </div>
      </div>
      <button id="next-chapter-btn">进入下一章</button>
    </div>

    <div id="howto-screen" class="hidden overlay">
      <h2>游戏说明</h2>
      <div class="howto-content rpg-panel">
        <p><b>操作：</b>鼠标点击选择角色和移动/攻击目标</p>
        <p><b>回合制战棋：</b>我方所有角色行动完毕后进入敌方回合</p>
        <p><b>属性相克：</b>火→冰→雷→火，暗↔圣</p>
        <p><b>地形效果：</b>树林增加回避，山地增加防御</p>
        <p><b>胜利条件：</b>消灭所有敌人或达成关卡目标</p>
        <p><b>角色成长：</b>击败敌人获得经验值，升级提升属性</p>
      </div>
      <button id="howto-back">返回</button>
    </div>
    <div id="toast-msg" class="hidden rpg-panel"></div>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/audio.js"></script>
<script src="js/spritesheet.js"></script>
<script src="js/renderer.js"></script>
<script src="js/battle.js"></script>
<script src="js/story.js"></script>
<script src="js/game.js"></script>
</body>
</html>
